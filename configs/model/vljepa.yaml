# VL-JEPA model configuration

# Visual encoder (V-JEPA 2 ViT-L/16)
encoder:
  name: vjepa2_vit_large
  output_dim: 1024
  temporal_patch_size: 2
  spatial_patch_size: 16
  input_resolution: 256
  freeze: true
  unfreeze_last_n: 2

# Language adapter
# Upgraded from all-MiniLM-L6-v2 (22M) to all-mpnet-base-v2 (109M)
# For complex spatial reasoning, consider: Qwen/Qwen2.5-1.5B-Instruct
language_adapter:
  model_name: sentence-transformers/all-mpnet-base-v2
  visual_dim: 1024
  hidden_dim: 768
  num_cross_heads: 8
  num_spatial_layers: 2
  dropout: 0.1
  max_seq_len: 128

# Velocity field network
velocity_field:
  visual_dim: 1024
  proprio_dim: 7
  pose_emb_dim: 64
  time_emb_dim: 128
  hidden_dim: 512
  num_layers: 6
  dropout: 0.1

# Flow matching (includes task-conditioned metric + learned halting)
flow_matching:
  sigma_min: 0.001
  sigma_max: 0.5
  beta_alpha: 1.5
  beta_beta: 1.0
  task_dim: 1024  # metric conditioned on visual features

# Conformal safety (wired into validation and deployment)
conformal:
  enabled: true
  alpha: 0.1  # 90% coverage target
  safety_radius: 2.0  # max radius before fallback
  eta: 0.005  # Gibbs-Candès learning rate
  decay: 0.995  # exponential decay for old scores

# Inference
inference:
  method: adaptive  # "adaptive", "euler", or "rk4"
  num_steps: 20  # only for euler/rk4
  atol: 1.0e-3  # adaptive ODE absolute tolerance
  rtol: 1.0e-2  # adaptive ODE relative tolerance
  max_steps: 200  # adaptive ODE max steps
